<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>连连看全栈版</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>水果连连看</h1>
    <div class="info-bar">
      <span>得分：<span id="score">0</span></span>
      <span>剩余：<span id="remain">0</span></span>
      <span>时间：<span id="timer">00:00</span></span>
    </div>
    <div class="btn-group">
      <button id="startBtn">开始游戏</button>
      <button id="hintBtn">提示(3)</button>
      <button id="shuffleBtn">重排(3)</button>
      <button id="rankBtn">排行榜</button>
    </div>
    <div class="board-box">
      <div id="board"></div>
      <canvas id="lineCanvas"></canvas>
    </div>
  </div>

  <!-- 结算弹窗 -->
  <div id="gameOverModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modalTitle">游戏结束</h2>
      <p>最终得分：<span id="finalScore">0</span></p>
      <p>用时：<span id="finalTime">00:00</span></p>
      <input type="text" id="nicknameInput" placeholder="输入昵称保存分数">
      <div class="modal-btn">
        <button id="submitScoreBtn">提交分数</button>
        <button id="restartBtn">再来一局</button>
      </div>
    </div>
  </div>

  <!-- 排行榜弹窗 -->
  <div id="rankModal" class="modal hidden">
    <div class="modal-content">
      <h2>排行榜TOP20</h2>
      <div id="rankList"></div>
      <button id="closeRankBtn">关闭</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
